services:
  voice-assistant:
    build: .
    container_name: voice-assistant
    ports:
      - "8800:8800"
    volumes:
      - ./config.yaml:/app/config.yaml:ro
    environment:
      - STT_ENDPOINT=http://host.docker.internal:8200
      - LLM_ENDPOINT=http://host.docker.internal:8400
      - TTS_ENDPOINT=http://host.docker.internal:8200
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
