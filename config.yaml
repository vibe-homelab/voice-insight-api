# Voice Insight API Configuration
# Updated: 2026-03 — Whisper v3 Turbo, Kokoro, Dia 1.6B, CSM (M4 Mac Mini 32GB)
#
# Platform support:
#   macOS (Apple Silicon) - MLX backend: Whisper, Kokoro, Dia, CSM
#   Linux (NVIDIA CUDA)   - vLLM/PyTorch: Voxtral Mini, Qwen3-TTS
#
# Set VOICE_PLATFORM=cuda or VOICE_PLATFORM=mlx to override auto-detection.

models:
  # ── MLX Models (macOS Apple Silicon) ──────────────────────────

  # STT Models (Speech-to-Text)
  stt-fast:
    type: "stt"
    path: "mlx-community/whisper-large-v3-turbo"
    hot_reload: true
    backend: "mlx"
    params:
      memory_gb: 1.5
      batch_size: 12
      language: null

  stt-best:
    type: "stt"
    path: "mlx-community/whisper-large-v3-mlx"
    hot_reload: false
    backend: "mlx"
    params:
      memory_gb: 3.0
      batch_size: 8
      language: null

  # TTS Models (Text-to-Speech)
  tts-fast:
    type: "tts"
    path: "mlx-community/Kokoro-82M-bf16"
    hot_reload: true
    backend: "mlx"
    params:
      memory_gb: 0.5
      voice: "af_heart"
      speed: 1.0

  tts-quality:
    type: "tts"
    path: "mlx-community/Dia-1.6B-4bit"
    hot_reload: false
    backend: "mlx"
    params:
      memory_gb: 0.8
      streaming: true

  tts-clone:
    type: "tts"
    path: "mlx-community/csm-1b"
    hot_reload: false
    backend: "mlx"
    params:
      memory_gb: 2.0
      voice_cloning: true

  # ── voxtral.c (macOS native, Metal GPU) ─────────────────────
  # Pure C implementation of Voxtral Realtime 4B.
  # Run: bash scripts/setup-voxtralc.sh

  stt-voxtralc:
    type: "voxtralc_stt"
    path: "./models/voxtral"
    hot_reload: false
    backend: "voxtralc"
    params:
      memory_gb: 8.0
      binary_path: "./bin/voxtral"
      interval: 2.0

  # ── CUDA Models (Linux NVIDIA GPU) ───────────────────────────

  # STT via Voxtral Mini 4B Realtime (vLLM serve)
  stt-cuda:
    type: "cuda_stt"
    path: "mistralai/Voxtral-Mini-4B-Realtime-2602"
    hot_reload: false
    backend: "cuda"
    params:
      memory_gb: 8.0
      gpu_memory_utilization: 0.85
      max_model_len: 8192

  # TTS via Qwen3-TTS (PyTorch)
  tts-cuda:
    type: "cuda_tts"
    path: "Qwen/Qwen3-TTS-12Hz-1.7B-Base"
    hot_reload: false
    backend: "cuda"
    params:
      memory_gb: 4.0

memory:
  max_unified_memory_gb: 32
  eviction_threshold_percent: 75
  safety_margin_gb: 2.0

gateway:
  host: "0.0.0.0"
  port: 8200
  api_key: ""

workers:
  manager_port: 8210
  base_port: 8211
  idle_timeout_seconds: 300
  health_check_interval: 30
  startup_timeout: 300  # CUDA models take longer to load
